networks:
  frontend:
  backend:
    internal: true

services:
  # --- TLS REVERSE PROXY ---
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    networks:
      - frontend
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro,Z
      - ./nginx/entrypoint.sh:/docker-entrypoint-override.sh:ro,Z
      - nginx_certs:/etc/nginx/certs
    entrypoint: ["/bin/sh", "/docker-entrypoint-override.sh"]
    depends_on:
      - web

  web:
    build: .
    restart: always
    ports:
      - "127.0.0.1:8000:80"
    networks:
      - frontend
      - backend
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=cajassistema
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - BIO_MDS_DB_STRICT_MODE=1
      - BIO_MDS_LOG_DIR=/var/www/html/logs
      - APP_URL=${APP_URL}
      - REPO_MDS_BASE_URL=${APP_URL}/REPO-MDS
      - BIO_MDS_LARAVEL_BASE_URL=${APP_URL}
      - BIO_MDS_LARAVEL_INTERNAL_URL=http://localhost
      - BIO_MDS_APP_BASE_PATH=/REPO-MDS
      - SESSION_SECURE_COOKIE=true
    volumes:
      - ./app:/var/www/html:Z
      - vendor_data:/var/www/html/vendor
      - frmwk_vendor_data:/var/www/html/frmwk/vendor
      - frmwk_cache_data:/var/www/html/frmwk/bootstrap/cache
    depends_on:
      db:
        condition: service_healthy

  backup:
    image: mariadb:10.11
    restart: always
    networks:
      - backend
    environment:
      - DB_HOST=db
      - DB_DATABASE=cajassistema
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
    volumes:
      - ./backup.sh:/backup.sh:ro,Z
      - ./backups:/backups:Z
    entrypoint: ["/bin/sh", "/backup.sh"]
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mariadb:10.11
    restart: always
    command: --lower-case-table-names=1
    networks:
      - backend
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=cajassistema
      - MYSQL_USER=${DB_USERNAME}
      - MYSQL_PASSWORD=${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./init-db:/docker-entrypoint-initdb.d:Z
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 10s
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data:
  vendor_data:
  frmwk_vendor_data:
  frmwk_cache_data:
  nginx_certs:
